services:
  - type: web
    name: mota-store
    env: node
    plan: free
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: VITE_APP_ID
        value: mota-store
      - key: VITE_OAUTH_PORTAL_URL
        value: https://auth.manus.im
      - key: OAUTH_SERVER_URL
        value: https://auth.manus.im
